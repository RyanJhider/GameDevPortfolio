<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="puzzle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b2e"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#1a2d2e"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#puzzle)"/>
  <rect x="340" y="150" width="600" height="420" fill="#1a1a2a" stroke="#00ffcc" stroke-width="3" rx="10"/>
  <text x="640" y="200" font-family="Arial" font-size="20" fill="#00ffcc" text-anchor="middle" font-weight="bold">PUZZLE CHAMBER</text>
  <!-- Puzzle elements -->
  <rect x="380" y="250" width="100" height="100" fill="#00ffcc" opacity="0.2" rx="5"/>
  <rect x="510" y="250" width="100" height="100" fill="#00ffcc" opacity="0.3" rx="5"/>
  <rect x="640" y="250" width="100" height="100" fill="#00ffcc" opacity="0.4" rx="5"/>
  <rect x="770" y="250" width="100" height="100" fill="#00ffcc" opacity="0.2" rx="5"/>
  <!-- Symbols -->
  <text x="430" y="315" font-family="Arial" font-size="36" fill="#00ffcc" text-anchor="middle">★</text>
  <text x="560" y="315" font-family="Arial" font-size="36" fill="#00ffcc" text-anchor="middle">◆</text>
  <text x="690" y="315" font-family="Arial" font-size="36" fill="#00ffcc" text-anchor="middle">●</text>
  <text x="820" y="315" font-family="Arial" font-size="36" fill="#00ffcc" text-anchor="middle">▲</text>
  <!-- Hint text -->
  <rect x="400" y="450" width="480" height="80" fill="#252535" rx="5"/>
  <text x="640" y="490" font-family="Arial" font-size="14" fill="#8a8a9a" text-anchor="middle">Match the symbols to unlock the door</text>
  <text x="640" y="515" font-family="Arial" font-size="12" fill="#00ffcc" text-anchor="middle">Hint: Follow the ancient pattern...</text>
</svg>
