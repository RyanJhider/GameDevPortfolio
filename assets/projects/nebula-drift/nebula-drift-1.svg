<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="space" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#space)"/>
  <!-- Stars -->
  <circle cx="100" cy="100" r="2" fill="#fff"/>
  <circle cx="300" cy="50" r="1.5" fill="#fff"/>
  <circle cx="500" cy="150" r="2" fill="#fff"/>
  <circle cx="700" cy="80" r="1" fill="#fff"/>
  <circle cx="900" cy="120" r="2" fill="#fff"/>
  <circle cx="1100" cy="60" r="1.5" fill="#fff"/>
  <circle cx="200" cy="300" r="1" fill="#fff"/>
  <circle cx="600" cy="250" r="1.5" fill="#fff"/>
  <circle cx="1000" cy="280" r="1" fill="#fff"/>
  <!-- Asteroids -->
  <ellipse cx="200" cy="400" rx="40" ry="30" fill="#3a3a4a"/>
  <ellipse cx="500" cy="350" rx="60" ry="45" fill="#2a2a3a"/>
  <ellipse cx="900" cy="380" rx="50" ry="35" fill="#3a3a4a"/>
  <ellipse cx="1100" cy="450" rx="45" ry="40" fill="#2a2a3a"/>
  <!-- Player Ship -->
  <polygon points="640,500 620,540 640,520 660,540" fill="#00ffcc"/>
  <!-- Nebula -->
  <ellipse cx="640" cy="200" rx="300" ry="100" fill="#ff3366" opacity="0.1"/>
  <!-- UI Elements -->
  <rect x="50" y="50" width="150" height="80" fill="#1a1a2a" stroke="#00ffcc" stroke-width="2" rx="5"/>
  <text x="125" y="80" font-family="Arial" font-size="12" fill="#00ffcc" text-anchor="middle">SCORE</text>
  <text x="125" y="110" font-family="Arial" font-size="18" fill="#fff" text-anchor="middle">12,450</text>
  <rect x="1080" y="50" width="150" height="80" fill="#1a1a2a" stroke="#ff3366" stroke-width="2" rx="5"/>
  <text x="1155" y="80" font-family="Arial" font-size="12" fill="#ff3366" text-anchor="middle">TIME</text>
  <text x="1155" y="110" font-family="Arial" font-size="18" fill="#fff" text-anchor="middle">02:34</text>
</svg>
