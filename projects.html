<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Projects | Ryan Jhider</title>
    <script>
(function () {
  var html = document.documentElement;
  html.classList.add('dark');
  html.setAttribute('data-theme', 'dark');
  html.style.colorScheme = 'dark';
})();
</script>
    <link rel="stylesheet" href="css/style.css?v=10">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <!-- Firebase Config (excluded from Git, see js/config.example.js) -->
    <script src="js/config.public.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="site-header" id="site-header">
        <div class="site-header__inner">
            <a href="index.html" class="site-logo">RYAN<span>//</span>JHIDER</a>
            <nav class="site-nav" aria-label="Main">
                <ul class="site-nav__list">
                    <li><a href="index.html" class="site-nav__link" data-page="home">Home</a></li>
                    <li><a href="projects.html" class="site-nav__link" data-page="projects">Projects</a></li>
                    <li><a href="about.html" class="site-nav__link" data-page="about">About</a></li>
                    <span class="site-nav__indicator" aria-hidden="true"></span>
                </ul>
            </nav>
            <div class="site-header__actions">
                <a href="admin.html" class="site-admin-link">Admin</a>
                <a href="mailto:ryanjhider@gmail.com" class="site-cta">Get In Touch</a>
            </div>
        </div>
    </header>

    <!-- Projects Page -->
    <section class="projects-page">
        <!-- Page Header -->
        <div class="projects-page-header">
            <div class="projects-page-title-wrap">
                <span class="projects-page-label">// ARCHIVE</span>
                <h1 class="projects-page-title">All Projects</h1>
                <p class="projects-page-sub" id="projects-count-line">Loading collection...</p>
            </div>

            <!-- Search + Sort Controls -->
            <div class="projects-controls">
                <div class="projects-search">
                    <span class="projects-search-icon">⌕•</span>
                    <input type="text" id="projects-search-input" placeholder="Search projects, engines, roles..." autocomplete="off">
                    <button type="button" class="projects-search-clear" id="projects-search-clear" aria-label="Clear search">×</button>
                </div>
                <div class="projects-sort">
                    <label for="projects-sort-select" class="projects-sort-label">SORT</label>
                    <select id="projects-sort-select" class="projects-sort-select">
                        <option value="order">Manual</option>
                        <option value="date-desc">Newest first</option>
                        <option value="date-asc">Oldest first</option>
                        <option value="alpha-asc">A → Z</option>
                        <option value="alpha-desc">Z → A</option>
                        <option value="featured">Featured first</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Tag Filter Bar -->
        <div class="filter-bar" id="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
        </div>

        <!-- Active Filters (always visible when filter is applied) -->
        <div class="active-filters" id="active-filters" hidden>
            <span class="active-filters-label">// FILTERING_BY</span>
            <div class="active-filters-pills" id="active-filters-pills"></div>
            <button type="button" class="active-filters-clear" id="active-filters-clear">CLEAR ×</button>
        </div>

        <!-- Featured Strip (single card visible, scroll-snap carousel) -->
        <div class="projects-featured-wrap" id="projects-featured-wrap" hidden>
            <div class="projects-section-label">
                <span class="projects-section-label-dot"></span>
                <span>FEATURED</span>
                <span class="projects-section-label-count" id="featured-count">0</span>
                <div class="featured-nav">
                    <button type="button" class="featured-nav-btn" id="featured-prev" aria-label="Previous featured">&lsaquo;</button>
                    <button type="button" class="featured-nav-btn" id="featured-next" aria-label="Next featured">&rsaquo;</button>
                </div>
            </div>
            <div class="projects-featured-viewport">
                <div class="projects-featured" id="projects-featured"></div>
                <div class="featured-edge featured-edge-left" id="featured-edge-left"></div>
                <div class="featured-edge featured-edge-right" id="featured-edge-right"></div>
            </div>
            <div class="featured-dots" id="featured-dots"></div>
        </div>

        <!-- Main Grid -->
        <div class="projects-section-label" id="projects-grid-label" hidden>
            <span class="projects-section-label-dot"></span>
            <span id="projects-grid-label-text">ALL PROJECTS</span>
            <span class="projects-section-label-count" id="grid-count">0</span>
        </div>
        <div class="projects-grid" id="projects-list">
            <!-- Projects loaded via JS -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p class="footer-copy">© 2026 RyanJhider. All rights reserved.</p>
            <div class="footer-links">
                <a href="https://github.com" target="_blank" class="footer-link">GitHub</a>
                <a href="https://linkedin.com" target="_blank" class="footer-link">LinkedIn</a>
                <a href="https://itch.io" target="_blank" class="footer-link">Itch.io</a>
                <a href="mailto:ryanjhider@gmail.com" class="footer-link">Email</a>
            </div>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/main.js?v=13"></script>
    <script src="js/nav-indicator.js"></script>
</body>
</html>
